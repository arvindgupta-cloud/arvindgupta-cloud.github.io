name: Deploy to Netlify

on:
  push:
    branches:
      - main

permissions:
  contents: write
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Netlify
        run: |
          curl -H "Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}" \
          -X POST -F file=@./index.html \
          https://api.netlify.com/api/v1/sites/6309799f-29f8-4020-938d-daa6d1cd5f68/deploys

      - name: Print Deployed URL
        run: |
          echo "Your website is live at: https://arvindguptaportpolio.netlify.app"

      - name: Update Commit Status with URL
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              description: "Website successfully deployed!",
              context: "Netlify Deployment",
              target_url: "https://arvindguptaportpolio.netlify.app"
            });

      - name: Post Commit Comment with Deployed URL
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: "✅ Your website is live at: [https://arvindguptaportpolio.netlify.app](https://arvindguptaportpolio.netlify.app)"
            });
